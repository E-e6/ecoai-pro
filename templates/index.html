<!DOCTYPE html>
<html>
<head>
    <title>EcoAI Pro 🌍</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        input {
            margin: 10px;
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h1>🌱 EcoAI Pro Climate Tracker</h1>

<p>Enter your daily habits:</p>

<input id="transport" placeholder="Transport (km/day)">
<br>
<input id="food" placeholder="Meat meals/week">
<br>
<input id="energy" placeholder="Energy usage (hrs/day)">
<br>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
function analyze() {
    const data = {
        transport: document.getElementById("transport").value,
        food: document.getElementById("food").value,
        energy: document.getElementById("energy").value
    };

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            `Score: ${data.score} <br>
             30-Day Impact Prediction: ${data.prediction} <br>
             AI Advice: ${data.advice}`;
    });
}
</script>

</body>
</html>
